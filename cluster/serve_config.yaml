# Cross-OEM heterogeneous Ray Serve deployment
#
# Topology:
#   - Worker A (Radeon gfx1151)  — custom resource AMD_GPU=1
#   - Worker B (DGX Spark CUDA)  — custom resource NVIDIA_GPU=1
#
# Routing policy:
#   fixed replica count at three replicas and one replica per GPU node.
#

proxy_location: HeadOnly

applications:
  - name: gateway
    route_prefix: /
    import_path: app:gateway
    runtime_env:
      pip:
        - "fastapi==0.136.3"
        - "starlette==1.3.1"
        - "httpx==0.28.1"
        - "boto3==1.43.33"
        - "requests==2.34.2"
        - "typing-extensions==4.15.0"
      env_vars:
        INFER_URL: "http://localhost:8000/infer/v1/chat/completions"
        CONCURRENCY: "24"
        UPDATE_VERSION: "18"
    deployments:
      - name: GatewayDeployment
        num_replicas: 1
        ray_actor_options:
          num_cpus: 1
          num_gpus: 0
          resources:
            "node:100.123.244.93": 0.001

  - name: qwen7b
    route_prefix: /infer
    import_path: vllm_deployment_simple:model
    runtime_env:
      env_vars:
        UPDATE_VERSION: "26"
        MODEL_NAME: "Qwen/Qwen2.5-7B-Instruct"
        SERVED_MODEL_NAME: "qwen2.5-7b"
        MAX_MODEL_LEN: "4096"
        GPU_MEMORY_UTILIZATION: "0.55"
        VLLM_EXTRA_ARGS: "--enforce-eager --dtype bfloat16"
        HF_HOME: "/home/michael/.cache/huggingface"
        PYTHONPATH: "/home/michael:/home/ubuntu"
        VLLM_PYTHON: "python3"

    deployments:
      - name: VLLMDeployment
        num_replicas: 3
        max_replicas_per_node: 1
        ray_actor_options:
          num_gpus: 1
          num_cpus: 4
