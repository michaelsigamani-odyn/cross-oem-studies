server {
    listen 80;
    server_name __RAY_DASHBOARD_SERVER_NAME__;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name __RAY_DASHBOARD_SERVER_NAME__;

    ssl_certificate /etc/letsencrypt/live/__RAY_DASHBOARD_SERVER_NAME__/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/__RAY_DASHBOARD_SERVER_NAME__/privkey.pem;

    auth_basic "Ray Dashboard";
    auth_basic_user_file /etc/nginx/.ray-dashboard.htpasswd;

    location / {
        proxy_pass http://__RAY_DASHBOARD_UPSTREAM__;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
